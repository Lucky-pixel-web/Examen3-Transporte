spring:
  application:
    name: api-gateway
  config:
    import: "optional:configserver:http://localhost:8088"
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: ms-reserva
              uri: lb://ms-reserva
              predicates:
                - Path=/api/reservas/**
            - id: auth-service
              uri: lb://auth-service
              predicates:
                - Path=/auth/**

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true